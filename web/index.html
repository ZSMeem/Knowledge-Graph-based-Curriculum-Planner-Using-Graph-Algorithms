<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curriculum Planner Graph</title>
  <link rel="stylesheet" href="style.css" />
  <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.0/dist/vis-network.min.js"></script>
</head>
<body>
  <div class="header">
    <h2>Interactive Curriculum Knowledge Graph</h2>
    <p>Drag nodes to reposition the graph.</p>
  </div>
  <nav>
    <a href="#" id="curriculum-link">Course Curriculum</a>
    <a href="#" id="suggestion-link">Suggestion</a>
  </nav>
  <div id="curriculum-section">
    <h2>Course Curriculum</h2>
    <table id="curriculum-table">
      <thead>
        <tr>
          <th>Course Code</th>
          <th>Course Name</th>
          <th>Type</th>
          <th>Concentration</th>
          <th>Credits</th>
          <th>Prerequisite Courses</th>
          <th>Offered Semester</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  

  <div id="suggestion-section" style="display: none;">
  
    <div class="suggestion-layout" style="display: flex;">
    <main class="suggestion-main" style="flex: 3;">
      <div id="network" style="height: 1000px;"></div>
    </main>
    <aside class="suggestion-sidebar" style="flex: 1;">
      <div class="suggestion-controls">
        <label for="concentration-select">Choose concentration:</label>
        <select id="concentration-select">
          <option value="none">None</option>
        </select>
      </div>

      <div id="sequence">
        <h3>Recommended Course Sequence</h3>
        <ol id="course-list"></ol>
      </div>
    </aside>
  </div>
</div>
  <script src="app.js"></script>
</body>
</html>
